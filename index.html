<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SunFounder Downloads</title>
    <style>
        :root {
            --primary-color: #333;
            --primary-hover: #000;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
            background-color: #fff;
        }
        h1 {
            color: #007bff;
            font-size: 36px;
        }
        .subtitle {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
        }
        .product-image {
            max-width: 400px;
            width: 100%;
            height: auto;
            border-radius: 10px 10px 0 0;
            display: block;
            border: 1px solid #ddd;
            border-bottom: none;
            box-sizing: border-box;
        }
        .product-card {
            display: inline-block;
            background-color: white;
            border: 2px solid #007bff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, box-shadow 0.2s;
            max-width: 400px;
        }
        .product-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }
        .product-card .btn {
            display: block;
            padding: 15px 30px;
            background-color: white;
            color: #007bff;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            border: none;
            border-top: 2px solid #007bff;
            border-radius: 0 0 8px 8px;
        }
        .product-card:hover .btn {
            background-color: #007bff;
            color: white;
        }
        .product-list {
            list-style: none;
            padding: 0;
        }
        .product-list li {
            margin: 20px 0;
        }
        .product-list a {
            display: inline-block;
            padding: 20px 40px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 6px rgba(0, 123, 255, 0.3);
        }
        .product-list a:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <h1>SunFounder Downloads</h1>
    <p class="subtitle">Welcome to the SunFounder download page</p>
    <a href="ai-fusion-lab-kit/index.html" class="product-card">
        <img src="ai-fusion-lab-kit/main.png" alt="AI Fusion Lab Kit" class="product-image">
        <span class="btn">AI Fusion Lab Kit</span>
    </a>
</body>
</html>
